function dateStampForFilename() {
  const d = new Date();
  const p2 = n => String(n).padStart(2, "0");
  return d.getFullYear() + p2(d.getMonth() + 1) + p2(d.getDate()) + "_" + p2(d.getHours()) + p2(d.getMinutes());
}

function handleImportFile(file) {
  const reader = new FileReader();
  reader.onload = function (e) {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!parsed || !parsed.meta || !Array.isArray(parsed.rooms)) {
        showToast("Fichier non reconnu comme une saisie CEL-47 valide.");
        return;
      }
      openConfirmModal(
        "Reprendre cette saisie ?",
        "Le brouillon en cours sera remplacé par le contenu du fichier importé.",
        () => {
          STATE = mergeWithEmptyState(parsed);
          UI.openElemKeys = new Set();
          saveState();
          UI.activeSection = "identification";
          renderApp();
          showToast("Saisie importée avec succès.");
        }
      );
    } catch (err) {
      showToast("Le fichier sélectionné n'est pas un JSON valide.");
    }
  };
  reader.readAsText(file);
}

/* Fusionne un état importé (potentiellement issu d'une version antérieure
   du référentiel) avec une structure vide à jour, afin d'éviter les
   erreurs si de nouveaux champs ont été ajoutés depuis l'export. */
function mergeWithEmptyState(imported) {
  const base = emptyState();
  return Object.assign(base, imported, {
    meta: Object.assign(base.meta, imported.meta || {}, {
      presence_parties: Object.assign(base.meta.presence_parties, (imported.meta && imported.meta.presence_parties) || {})
    }),
    plomb: Object.assign(base.plomb, imported.plomb || {}, {
      photos: (imported.plomb && Array.isArray(imported.plomb.photos)) ? imported.plomb.photos : base.plomb.photos
    })
  });
}

/* ============================================================================
   MINI-MOTEUR ZIP (méthode "store", sans compression)
   Un fichier .docx est une archive ZIP contenant des fichiers XML. Le format
   ZIP "store" (sans compression deflate) est parfaitement valide et lu
   nativement par Word/LibreOffice ; il évite toute dépendance externe pour
   produire l'export Word directement dans le navigateur.
   Implémentation autonome, sans bibliothèque tierce.
   ============================================================================ */

const CRC32_TABLE = (function () {
  const table = new Uint32Array(256);
  for (let n = 0; n < 256; n++) {
    let c = n;
    for (let k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
    table[n] = c >>> 0;
  }
  return table;
})();

function crc32(bytes) {
  let crc = 0xFFFFFFFF;
  for (let i = 0; i < bytes.length; i++) {
    crc = CRC32_TABLE[(crc ^ bytes[i]) & 0xFF] ^ (crc >>> 8);
  }
  return (crc ^ 0xFFFFFFFF) >>> 0;
}

function strToBytes(str) {
  return new TextEncoder().encode(str);
}

function dosDateTime(date) {
  const time = ((date.getHours() & 0x1F) << 11) | ((date.getMinutes() & 0x3F) << 5) | ((date.getSeconds() >> 1) & 0x1F);
  const yr = date.getFullYear() - 1980;
  const dosDate = ((yr & 0x7F) << 9) | (((date.getMonth() + 1) & 0xF) << 5) | (date.getDate() & 0x1F);
  return { time: time & 0xFFFF, date: dosDate & 0xFFFF };
}

/* Construit une archive ZIP (store) à partir d'une liste {name, data(Uint8Array)}.
   Retourne un Blob prêt à être téléchargé. */
function buildZip(files) {
  const now = new Date();
  const { time, date } = dosDateTime(now);
  const localParts = [];
  const centralParts = [];
  let offset = 0;

  files.forEach(f => {
    const nameBytes = strToBytes(f.name);
    const data = f.data;
    const crc = crc32(data);
    const size = data.length;

    // Local file header
    const lh = new DataView(new ArrayBuffer(30));
    lh.setUint32(0, 0x04034b50, true);   // signature
    lh.setUint16(4, 20, true);           // version needed
    lh.setUint16(6, 0, true);            // flags
    lh.setUint16(8, 0, true);            // compression = store
    lh.setUint16(10, time, true);
    lh.setUint16(12, date, true);
    lh.setUint32(14, crc, true);
    lh.setUint32(18, size, true);        // compressed size
    lh.setUint32(22, size, true);        // uncompressed size
    lh.setUint16(26, nameBytes.length, true);
    lh.setUint16(28, 0, true);           // extra field length

    localParts.push(new Uint8Array(lh.buffer));
    localParts.push(nameBytes);
    localParts.push(data);

    // Central directory header
    const ch = new DataView(new ArrayBuffer(46));
    ch.setUint32(0, 0x02014b50, true);
    ch.setUint16(4, 20, true);
    ch.setUint16(6, 20, true);
    ch.setUint16(8, 0, true);
    ch.setUint16(10, 0, true);
    ch.setUint16(12, time, true);
    ch.setUint16(14, date, true);
    ch.setUint32(16, crc, true);
    ch.setUint32(20, size, true);
    ch.setUint32(24, size, true);
    ch.setUint16(28, nameBytes.length, true);
    ch.setUint16(30, 0, true);
    ch.setUint16(32, 0, true);
    ch.setUint16(34, 0, true);
    ch.setUint16(36, 0, true);
    ch.setUint32(38, 0, true);
    ch.setUint32(42, offset, true);

    centralParts.push(new Uint8Array(ch.buffer));
    centralParts.push(nameBytes);

    offset += lh.buffer.byteLength + nameBytes.length + size;
  });

  const localBlobParts = localParts;
  const centralStart = offset;
  let centralSize = 0;
  centralParts.forEach(p => centralSize += p.length);

  const eocd = new DataView(new ArrayBuffer(22));
  eocd.setUint32(0, 0x06054b50, true);
  eocd.setUint16(4, 0, true);
  eocd.setUint16(6, 0, true);
  eocd.setUint16(8, files.length, true);
  eocd.setUint16(10, files.length, true);
  eocd.setUint32(12, centralSize, true);
  eocd.setUint32(16, centralStart, true);
  eocd.setUint16(20, 0, true);

  const allParts = localBlobParts.concat(centralParts).concat([new Uint8Array(eocd.buffer)]);
  return new Blob(allParts, { type: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" });
}

/* ============================================================================
   EXPORT — DOCUMENT WORD (.docx) NATIF
   Génère un fichier .docx valide (OOXML) directement dans le navigateur,
   à partir des mêmes blocs structurés que l'export impression/PDF.
   Aucune dépendance externe : XML et ZIP entièrement produits en JS.
   ============================================================================ */

function xmlEscape(str) {
  if (str === null || str === undefined) return "";
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&apos;");
}

/* Découpe une dataURL base64 "data:image/jpeg;base64,XXXX" en bytes bruts. */
function dataUrlToBytes(dataUrl) {
  const comma = dataUrl.indexOf(",");
  const meta = dataUrl.slice(5, comma);          // ex: image/jpeg;base64
  const isBase64 = meta.indexOf("base64") !== -1;
  const mime = meta.split(";")[0];
  const payload = dataUrl.slice(comma + 1);
  let bytes;
  if (isBase64) {
    const binStr = atob(payload);
    bytes = new Uint8Array(binStr.length);
    for (let i = 0; i < binStr.length; i++) bytes[i] = binStr.charCodeAt(i);
  } else {
    bytes = strToBytes(decodeURIComponent(payload));
  }
  return { bytes: bytes, mime: mime };
}

/* Lit la largeur/hauteur réelle (en px) d'une dataURL image, de façon
   synchrone via un Image() préchargé — utilisé pour calculer le ratio
   d'affichage dans le document Word. Retourne une Promise. */
function readImageDims(dataUrl) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve({ w: img.naturalWidth || 800, h: img.naturalHeight || 600 });
    img.onerror = () => resolve({ w: 800, h: 600 });
    img.src = dataUrl;
  });
}

const EMU_PER_PX = 9525; // valeur standard OOXML (96 dpi)
const DOCX_PHOTO_WIDTH_PX = 220; // largeur d'affichage cible dans le document

async function exportDocx() {
  showToast("Génération du document Word en cours…");
  try {
    const blocks = buildReportBlocks();

    // 1) Collecte de toutes les photos de pièces référencées dans les blocs,
    //    dans l'ordre d'apparition, ainsi que les signatures (traitées via
    //    le même mécanisme mais adressées par dataURL plutôt que par file).
    const photoRefs = [];
    blocks.forEach(b => {
      if (b.type === "photoGrid") {
        b.photos.forEach(p => photoRefs.push(p.data));
      }
    });
    const signatureUrls = ["expert", "bailleur", "locataire"]
      .map(role => STATE.signatures[role])
      .filter(Boolean);

    // 2) Pré-calcul des dimensions de chaque image (nécessaire pour <wp:extent>),
    //    photos de pièces et signatures confondues.
    const allUrlsForDims = photoRefs.concat(signatureUrls);
    const allDims = await Promise.all(allUrlsForDims.map(readImageDims));
    const dimsByUrl = new Map();
    allUrlsForDims.forEach((url, i) => { if (!dimsByUrl.has(url)) dimsByUrl.set(url, allDims[i]); });

    // 3) Génère le XML du corps de document. Un cache (par dataURL) garantit
    //    qu'une même image n'est jamais embarquée deux fois dans l'archive,
    //    même si elle apparaît dans plusieurs blocs.
    const mediaFiles = []; // {name, data, mime}
    const relationships = []; // {id, target}
    const relIdCache = new Map(); // dataUrl -> relId déjà attribué
    let relIdCounter = 1;

    function relIdForDataUrl(dataUrl) {
      if (relIdCache.has(dataUrl)) return relIdCache.get(dataUrl);
      const { bytes, mime } = dataUrlToBytes(dataUrl);
      const ext = mime.indexOf("png") !== -1 ? "png" : "jpeg";
      const name = "image" + (mediaFiles.length + 1) + "." + ext;
      mediaFiles.push({ name: name, data: bytes, mime: mime });
      const relId = "rId" + (1000 + relIdCounter++); // namespace dédié aux images pour éviter collision avec les rels de base
      relationships.push({ id: relId, target: "media/" + name });
      relIdCache.set(dataUrl, relId);
      return relId;
    }

    let photoCursor = 0;
    // photoCallback() sans argument : consomme la prochaine photo de la file (cas photoGrid)
    // photoCallback.forSignature(dataUrl) : résout une image précise par sa dataURL (cas signatures)
    function photoCallback() {
      const dataUrl = photoRefs[photoCursor];
      photoCursor++;
      return { relId: relIdForDataUrl(dataUrl), dims: dimsByUrl.get(dataUrl) };
    }
    photoCallback.forSignature = function (dataUrl) {
      return { relId: relIdForDataUrl(dataUrl), dims: dimsByUrl.get(dataUrl) };
    };

    const bodyXmlParts = blocks.map(b => blockToOoxml(b, photoCallback));

    const documentXml = wrapDocumentXml(bodyXmlParts.join(""));
    const documentRelsXml = buildDocumentRelsXml(relationships);
    const contentTypesXml = buildContentTypesXml(mediaFiles);

    // 4) Assemble l'archive zip complète
    const files = [
      { name: "[Content_Types].xml", data: strToBytes(contentTypesXml) },
      { name: "_rels/.rels", data: strToBytes(RELS_ROOT_XML) },
      { name: "word/document.xml", data: strToBytes(documentXml) },
      { name: "word/_rels/document.xml.rels", data: strToBytes(documentRelsXml) },
      { name: "word/styles.xml", data: strToBytes(STYLES_XML) },
      { name: "docProps/core.xml", data: strToBytes(buildCoreXml()) },
      { name: "docProps/app.xml", data: strToBytes(APP_XML) }
    ];
    mediaFiles.forEach(mf => files.push({ name: "word/media/" + mf.name, data: mf.data }));

    const blob = buildZip(files);
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const safeAddr = (STATE.meta.adresse || "logement").replace(/[^a-z0-9]+/gi, "_").slice(0, 40);
    a.href = url;
    a.download = "EDL_CEL47_" + safeAddr + "_" + dateStampForFilename() + ".docx";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 5000);
    showToast("Document Word généré avec succès.");
  } catch (err) {
    console.error(err);
    showToast("Erreur lors de la génération du document Word. Voir la console pour le détail.");
  }
}

/* ============================================================================
   TRADUCTION DES BLOCS EN XML OOXML (word/document.xml)
   ============================================================================ */

const DOCX_COLOR_NAVY = "13294B";
const DOCX_COLOR_GOLD = "A78A55";
const DOCX_COLOR_SOFT = "5B6472";

function ooxmlParagraph(runsXml, pPrXml) {
  return "<w:p>" + (pPrXml || "") + runsXml + "</w:p>";
}

function ooxmlRun(text, rPrXml) {
  return "<w:r>" + (rPrXml || "") + "<w:t xml:space=\"preserve\">" + xmlEscape(text) + "</w:t></w:r>";
}

function blockToOoxml(block, photoCallback) {
  switch (block.type) {

    case "title":
      return ooxmlParagraph(
        ooxmlRun(block.text, "<w:rPr><w:b/><w:color w:val=\"" + DOCX_COLOR_NAVY + "\"/><w:sz w:val=\"34\"/></w:rPr>"),
        "<w:pPr><w:jc w:val=\"center\"/><w:spacing w:after=\"60\"/></w:pPr>"
      );

    case "subtitle":
      return ooxmlParagraph(
        ooxmlRun(block.text, "<w:rPr><w:color w:val=\"" + DOCX_COLOR_SOFT + "\"/><w:sz w:val=\"19\"/></w:rPr>"),
        "<w:pPr><w:jc w:val=\"center\"/><w:spacing w:after=\"60\"/></w:pPr>"
      );

    case "heading1":
      return ooxmlParagraph(
        ooxmlRun(block.text, "<w:rPr><w:b/><w:color w:val=\"" + DOCX_COLOR_NAVY + "\"/><w:sz w:val=\"27\"/></w:rPr>"),
        "<w:pPr><w:spacing w:before=\"360\" w:after=\"160\"/><w:pBdr><w:bottom w:val=\"single\" w:sz=\"8\" w:space=\"4\" w:color=\"" + DOCX_COLOR_GOLD + "\"/></w:pBdr></w:pPr>"
      );

    case "heading2":
      return ooxmlParagraph(
        ooxmlRun(block.text, "<w:rPr><w:b/><w:color w:val=\"" + DOCX_COLOR_NAVY + "\"/><w:sz w:val=\"23\"/></w:rPr>"),
        "<w:pPr><w:spacing w:before=\"240\" w:after=\"120\"/></w:pPr>"
      );

    case "heading3":
      return ooxmlParagraph(
        ooxmlRun(block.text, "<w:rPr><w:b/><w:color w:val=\"1D3A63\"/><w:sz w:val=\"21\"/></w:rPr>"),
        "<w:pPr><w:spacing w:before=\"160\" w:after=\"90\"/></w:pPr>"
      );

    case "paragraph":
      return ooxmlParagraph(
        ooxmlRun(block.text, block.italic ? "<w:rPr><w:i/><w:color w:val=\"" + DOCX_COLOR_SOFT + "\"/></w:rPr>" : ""),
        "<w:pPr><w:spacing w:after=\"160\"/><w:jc w:val=\"both\"/></w:pPr>"
      );

    case "elementAbsent":
      return ooxmlParagraph(
        ooxmlRun(block.label + " : absent / sans objet" + (block.note ? " — " + block.note : ""),
          "<w:rPr><w:i/><w:color w:val=\"8A93A0\"/><w:sz w:val=\"20\"/></w:rPr>"),
        "<w:pPr><w:spacing w:after=\"140\"/></w:pPr>"
      );

    case "keyvalue":
      return ooxmlKeyValueTable(block.rows);

    case "photoGrid":
      return ooxmlPhotoGrid(block, photoCallback);

    case "signatureBlock":
      return ooxmlSignatureBlock(block.signatures, photoCallback.forSignature);

    default:
      return "";
  }
}

/* ---------- Tableau clé/valeur ---------- */
function ooxmlKeyValueTable(rows) {
  const trXml = rows.map(r => {
    const key = r[0], val = r[1] || "—";
    const tcKey = "<w:tc><w:tcPr><w:tcW w:w=\"2400\" w:type=\"dxa\"/><w:shd w:val=\"clear\" w:fill=\"F6F4EC\"/></w:tcPr>" +
      ooxmlParagraph(ooxmlRun(key, "<w:rPr><w:b/><w:color w:val=\"" + DOCX_COLOR_NAVY + "\"/><w:sz w:val=\"19\"/></w:rPr>")) +
      "</w:tc>";
    const tcVal = "<w:tc><w:tcPr><w:tcW w:w=\"6800\" w:type=\"dxa\"/></w:tcPr>" +
      ooxmlParagraph(ooxmlRun(val, "<w:rPr><w:sz w:val=\"19\"/></w:rPr>")) +
      "</w:tc>";
    return "<w:tr>" + tcKey + tcVal + "</w:tr>";
  }).join("");

  return "<w:tbl>" +
    "<w:tblPr><w:tblW w:w=\"9200\" w:type=\"dxa\"/><w:tblBorders>" +
    "<w:top w:val=\"single\" w:sz=\"4\" w:color=\"DDE1E7\"/><w:left w:val=\"single\" w:sz=\"4\" w:color=\"DDE1E7\"/>" +
    "<w:bottom w:val=\"single\" w:sz=\"4\" w:color=\"DDE1E7\"/><w:right w:val=\"single\" w:sz=\"4\" w:color=\"DDE1E7\"/>" +
    "<w:insideH w:val=\"single\" w:sz=\"4\" w:color=\"DDE1E7\"/><w:insideV w:val=\"single\" w:sz=\"4\" w:color=\"DDE1E7\"/>" +
    "</w:tblBorders></w:tblPr>" +
    "<w:tblGrid><w:gridCol w:w=\"2400\"/><w:gridCol w:w=\"6800\"/></w:tblGrid>" +
    trXml +
    "</w:tbl>" +
    ooxmlParagraph("", "<w:pPr><w:spacing w:after=\"120\"/></w:pPr>"); // espace après tableau (Word exige un paragraphe après un tbl en fin de section)
}

/* ---------- Grille de photos ---------- */
function ooxmlPhotoGrid(block, photoCallback) {
  const drawings = block.photos.map(() => {
    const ref = photoCallback(); // {relId, dims:{w,h}}
    const ratio = ref.dims.h / ref.dims.w;
    const widthPx = DOCX_PHOTO_WIDTH_PX;
    const heightPx = Math.round(widthPx * ratio);
    const widthEmu = widthPx * EMU_PER_PX;
    const heightEmu = heightPx * EMU_PER_PX;
    const docPrId = Math.floor(Math.random() * 1000000);

    return "<w:r><w:drawing><wp:inline distT=\"0\" distB=\"0\" distL=\"0\" distR=\"0\">" +
      "<wp:extent cx=\"" + widthEmu + "\" cy=\"" + heightEmu + "\"/>" +
      "<wp:effectExtent l=\"0\" t=\"0\" r=\"0\" b=\"0\"/>" +
      "<wp:docPr id=\"" + docPrId + "\" name=\"Photo" + docPrId + "\"/>" +
      "<a:graphic xmlns:a=\"http://schemas.openxmlformats.org/drawingml/2006/main\">" +
      "<a:graphicData uri=\"http://schemas.openxmlformats.org/drawingml/2006/picture\">" +
      "<pic:pic xmlns:pic=\"http://schemas.openxmlformats.org/drawingml/2006/picture\">" +
      "<pic:nvPicPr><pic:cNvPr id=\"" + docPrId + "\" name=\"Photo" + docPrId + "\"/><pic:cNvPicPr/></pic:nvPicPr>" +
      "<pic:blipFill><a:blip r:embed=\"" + ref.relId + "\"/><a:stretch><a:fillRect/></a:stretch></pic:blipFill>" +
      "<pic:spPr><a:xfrm><a:off x=\"0\" y=\"0\"/><a:ext cx=\"" + widthEmu + "\" cy=\"" + heightEmu + "\"/></a:xfrm>" +
      "<a:prstGeom prst=\"rect\"><a:avLst/></a:prstGeom></pic:spPr>" +
      "</pic:pic></a:graphicData></a:graphic></wp:inline></w:drawing></w:r>" +
      "<w:r><w:tab/></w:r>"; // léger espacement horizontal entre photos
  }).join("");

  const photosPara = ooxmlParagraph(drawings, "<w:pPr><w:spacing w:after=\"40\"/></w:pPr>");
  const captionPara = block.caption ? ooxmlParagraph(
    ooxmlRun(block.caption, "<w:rPr><w:i/><w:color w:val=\"8A93A0\"/><w:sz w:val=\"17\"/></w:rPr>"),
    "<w:pPr><w:spacing w:after=\"180\"/></w:pPr>"
  ) : "";

  return photosPara + captionPara;
}

/* ---------- Bloc de signatures (3 colonnes via tableau) ----------
   Les signatures (images PNG base64) utilisent le même mécanisme de
   relation d'image que les photos de pièces, via photoCallback, afin
   d'éviter tout système de placeholder à remplacer après coup. */
function ooxmlSignatureBlock(signatures, photoCallback) {
  const roles = ["expert", "bailleur", "locataire"];
  const SIG_WIDTH_PX = 180;

  const cellsXml = roles.map(role => {
    const label = SIGNATURE_ROLE_LABEL[role];
    const labelPara = ooxmlParagraph(
      ooxmlRun(label, "<w:rPr><w:b/><w:color w:val=\"" + DOCX_COLOR_NAVY + "\"/><w:sz w:val=\"18\"/></w:rPr>"),
      "<w:pPr><w:spacing w:after=\"100\"/></w:pPr>"
    );

    let bodyXml;
    if (signatures[role]) {
      const ref = photoCallback(signatures[role]); // {relId, dims:{w,h}}
      const ratio = ref.dims.h / ref.dims.w;
      const widthEmu = SIG_WIDTH_PX * EMU_PER_PX;
      const heightEmu = Math.round(SIG_WIDTH_PX * ratio) * EMU_PER_PX;
      const docPrId = Math.floor(Math.random() * 1000000);
      const drawingXml = "<w:r><w:drawing><wp:inline distT=\"0\" distB=\"0\" distL=\"0\" distR=\"0\">" +
        "<wp:extent cx=\"" + widthEmu + "\" cy=\"" + heightEmu + "\"/>" +
        "<wp:effectExtent l=\"0\" t=\"0\" r=\"0\" b=\"0\"/>" +
        "<wp:docPr id=\"" + docPrId + "\" name=\"Signature" + docPrId + "\"/>" +
        "<a:graphic xmlns:a=\"http://schemas.openxmlformats.org/drawingml/2006/main\">" +
        "<a:graphicData uri=\"http://schemas.openxmlformats.org/drawingml/2006/picture\">" +
        "<pic:pic xmlns:pic=\"http://schemas.openxmlformats.org/drawingml/2006/picture\">" +
        "<pic:nvPicPr><pic:cNvPr id=\"" + docPrId + "\" name=\"Signature" + docPrId + "\"/><pic:cNvPicPr/></pic:nvPicPr>" +
        "<pic:blipFill><a:blip r:embed=\"" + ref.relId + "\"/><a:stretch><a:fillRect/></a:stretch></pic:blipFill>" +
        "<pic:spPr><a:xfrm><a:off x=\"0\" y=\"0\"/><a:ext cx=\"" + widthEmu + "\" cy=\"" + heightEmu + "\"/></a:xfrm>" +
        "<a:prstGeom prst=\"rect\"><a:avLst/></a:prstGeom></pic:spPr>" +
        "</pic:pic></a:graphicData></a:graphic></wp:inline></w:drawing></w:r>";
      bodyXml = ooxmlParagraph(drawingXml);
    } else {
      bodyXml = ooxmlParagraph(ooxmlRun("Non signé", "<w:rPr><w:i/><w:color w:val=\"8A93A0\"/><w:sz w:val=\"18\"/></w:rPr>"));
    }

    return "<w:tc><w:tcPr><w:tcW w:w=\"3000\" w:type=\"dxa\"/></w:tcPr>" + labelPara + bodyXml + "</w:tc>";
  }).join("");

  return "<w:tbl>" +
    "<w:tblPr><w:tblW w:w=\"9200\" w:type=\"dxa\"/><w:tblBorders>" +
    "<w:top w:val=\"none\"/><w:left w:val=\"none\"/><w:bottom w:val=\"none\"/><w:right w:val=\"none\"/>" +
    "<w:insideH w:val=\"none\"/><w:insideV w:val=\"none\"/></w:tblBorders></w:tblPr>" +
    "<w:tblGrid><w:gridCol w:w=\"3066\"/><w:gridCol w:w=\"3066\"/><w:gridCol w:w=\"3068\"/></w:tblGrid>" +
    "<w:tr>" + cellsXml + "</w:tr>" +
    "</w:tbl>";
}

/* ============================================================================
   ENVELOPPES XML DU PAQUET OOXML (.docx)
   ============================================================================ */

/* Enveloppe le corps du document avec les déclarations XML, les namespaces
   nécessaires (w, r, wp, a, pic) et les propriétés de section (A4, marges). */
function wrapDocumentXml(bodyXml) {
  return '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
    '<w:document ' +
    'xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main" ' +
    'xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" ' +
    'xmlns:wp="http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing" ' +
    'xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" ' +
    'xmlns:pic="http://schemas.openxmlformats.org/drawingml/2006/picture">' +
    '<w:body>' +
    bodyXml +
    '<w:sectPr>' +
    '<w:pgSz w:w="11906" w:h="16838"/>' +                 // A4 en twentieths of a point (DXA)
    '<w:pgMar w:top="1134" w:right="1134" w:bottom="1134" w:left="1134" w:header="709" w:footer="709" w:gutter="0"/>' +
    '</w:sectPr>' +
    '</w:body>' +
    '</w:document>';
}

/* Relations du document principal : une par image (photo ou signature) embarquée,
   plus les styles, toujours nécessaires. */
function buildDocumentRelsXml(relationships) {
  const relsXml = relationships.map(r =>
    '<Relationship Id="' + r.id + '" ' +
    'Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" ' +
    'Target="' + r.target + '"/>'
  ).join("");

  return '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
    '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">' +
    '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>' +
    relsXml +
    '</Relationships>';
}

/* [Content_Types].xml : déclare les extensions globales (xml, rels) et un
   Default par type d'image effectivement utilisé dans le document (png/jpeg),
   plus les Override pour les parties XML nommées explicitement. */
function buildContentTypesXml(mediaFiles) {
  const extsUsed = new Set(mediaFiles.map(mf => mf.name.split(".").pop()));
  const imageDefaults = Array.from(extsUsed).map(ext => {
    const ct = ext === "png" ? "image/png" : "image/jpeg";
    return '<Default Extension="' + ext + '" ContentType="' + ct + '"/>';
  }).join("");

  return '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
    '<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">' +
    '<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>' +
    '<Default Extension="xml" ContentType="application/xml"/>' +
    imageDefaults +
    '<Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>' +
    '<Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/>' +
    '<Override PartName="/docProps/core.xml" ContentType="application/vnd.openxmlformats-package.core-properties+xml"/>' +
    '<Override PartName="/docProps/app.xml" ContentType="application/vnd.openxmlformats-officedocument.extended-properties+xml"/>' +
    '</Types>';
}

/* _rels/.rels : relations racine du paquet, pointant vers le document

/* docProps/core.xml : métadonnées descriptives du document. */
function buildCoreXml() {
  const now = new Date().toISOString();

  return '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +

    '<dc:title>' + xmlEscape("État des lieux technique contradictoire") + '</dc:title>' +
    '<dc:creator>' + xmlEscape(author) + '</dc:creator>' +

    '<dcterms:created xsi:type="dcterms:W3CDTF">' + now + '</dcterms:created>' +
    '<dcterms:modified xsi:type="dcterms:W3CDTF">' + now + '</dcterms:modified>' +
    '</cp:coreProperties>';
}

/* ============================================================================
   INITIALISATION DE L'APPLICATION AU CHARGEMENT
   ============================================================================ */

(function initApp() {
  const restored = loadState();
  if (restored) {
    STATE = mergeWithEmptyState(restored);
    setFooterInfo("Brouillon restauré (dernier enregistrement : " +
      (STATE.updatedAt ? formatDateTime(new Date(STATE.updatedAt)) : "inconnu") + ")");

  renderApp();
})();
