<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CEL-47 — État des lieux technique contradictoire</title>
<style>
:root{
  --navy:#13294b;
  --navy-light:#1d3a63;
  --gold:#a78a55;
  --gold-light:#cbb789;
  --bg:#f4f5f7;
  --card:#ffffff;
  --line:#dde1e7;
  --text:#1c2430;
  --text-soft:#5b6472;
  --ok:#2e7d4f;
  --warn:#b8860b;
  --bad:#b2342a;
  --radius:10px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:"Segoe UI",Calibri,Arial,sans-serif;font-size:15px;line-height:1.45;}
button{font-family:inherit;}
img{max-width:100%;display:block;}

/* ===== Bandeau identité ===== */
.topbar{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy-light) 100%);
  color:#fff;padding:16px 20px;position:sticky;top:0;z-index:50;
  box-shadow:0 2px 8px rgba(0,0,0,.25);
}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;max-width:1100px;margin:0 auto;}
.brand{display:flex;align-items:center;gap:12px;}
.brand-mark{width:42px;height:42px;border-radius:8px;background:var(--gold);
  display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--navy);font-size:17px;flex:none;}
.brand-text h1{margin:0;font-size:17px;font-weight:600;letter-spacing:.2px;}
.brand-text p{margin:1px 0 0;font-size:11.5px;color:#cdd6e4;}
.topbar-actions{display:flex;gap:8px;flex-wrap:wrap;}
.btn{
  border:1px solid transparent;border-radius:7px;padding:9px 14px;font-size:13.5px;font-weight:600;
  cursor:pointer;transition:filter .12s, transform .05s;display:inline-flex;align-items:center;gap:6px;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.btn:active{transform:scale(.97);}
.btn-gold{background:var(--gold);color:var(--navy);}
.btn-gold:hover{filter:brightness(1.08);}
.btn-ghost{background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.35);}
.btn-ghost:hover{background:rgba(255,255,255,.2);}
.btn-line{background:#fff;color:var(--navy);border:1.5px solid var(--navy);}
.btn-line:hover{background:#f0f2f6;}
.btn-danger{background:#fff;color:var(--bad);border:1.5px solid var(--bad);}
.btn-danger:hover{background:#fdeeec;}
.btn-sm{padding:6px 10px;font-size:12.5px;border-radius:6px;}
.btn[disabled]{opacity:.45;cursor:not-allowed;}

/* ===== Progress ===== */
.progress-wrap{max-width:1100px;margin:10px auto 0;padding:0 20px;}
.progress-track{height:6px;background:rgba(255,255,255,.18);border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;background:var(--gold);border-radius:4px;transition:width .25s;}
.progress-label{font-size:11px;color:#cdd6e4;margin-top:4px;}

/* ===== Layout général ===== */
.shell{max-width:1100px;margin:0 auto;padding:18px 16px 120px;}
.section-nav{
  display:flex;gap:6px;overflow-x:auto;padding:4px 0 14px;-webkit-overflow-scrolling:touch;
  scrollbar-width:thin;
}
.section-nav::-webkit-scrollbar{height:5px;}
.section-nav::-webkit-scrollbar-thumb{background:#c9cfd8;border-radius:3px;}
.navchip{
  flex:none;border:1.5px solid var(--line);background:#fff;color:var(--text-soft);
  border-radius:20px;padding:8px 14px;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap;
  display:flex;align-items:center;gap:6px;
}
.navchip.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.navchip .dot{width:7px;height:7px;border-radius:50%;background:#c9cfd8;flex:none;}
.navchip.done .dot{background:var(--ok);}
.navchip.active .dot{background:var(--gold);}

.card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:18px 18px 20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(20,30,50,.04);
}
.card h2{margin:0 0 4px;font-size:18px;color:var(--navy);font-weight:700;}
.card .subtitle{margin:0 0 16px;font-size:12.5px;color:var(--text-soft);}
.card h3{margin:22px 0 10px;font-size:14.5px;color:var(--navy);border-bottom:2px solid var(--gold-light);padding-bottom:6px;}
.card h3:first-of-type{margin-top:4px;}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
@media (max-width:640px){.grid2,.grid3{grid-template-columns:1fr;}}

.field{margin-bottom:13px;}
.field label{display:block;font-size:12px;font-weight:700;color:var(--text-soft);
  text-transform:uppercase;letter-spacing:.3px;margin-bottom:5px;}
.field .hint{font-size:11px;color:#8a93a0;font-weight:400;text-transform:none;letter-spacing:0;margin-top:3px;display:block;}
input[type=text],input[type=number],input[type=date],input[type=email],input[type=tel],textarea,select{
  width:100%;border:1.5px solid var(--line);border-radius:7px;padding:10px 11px;font-size:14.5px;
  font-family:inherit;color:var(--text);background:#fff;
}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--navy);}
textarea{resize:vertical;min-height:64px;}

/* ===== Choix segmentés (remplace les boutons radio visuels) ===== */
.seg{display:flex;flex-wrap:wrap;gap:6px;}
.seg-btn{
  border:1.5px solid var(--line);background:#fff;color:var(--text);border-radius:7px;
  padding:8px 13px;font-size:13px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;
}
.seg-btn.sel{background:var(--navy);color:#fff;border-color:var(--navy);}
.seg-btn.sel.tone-ok{background:var(--ok);border-color:var(--ok);}
.seg-btn.sel.tone-warn{background:var(--warn);border-color:var(--warn);}
.seg-btn.sel.tone-bad{background:var(--bad);border-color:var(--bad);}

/* ===== Elément d'inventaire (sol, murs, plafond, équipement...) ===== */
.elem-card{
  border:1.5px solid var(--line);border-radius:9px;margin-bottom:14px;overflow:hidden;background:#fbfbfc;
}
.elem-head{
  display:flex;align-items:stretch;justify-content:space-between;gap:0;
  width:100%;background:#fff;border-bottom:1px solid transparent;
}
.elem-head.open{border-bottom-color:var(--line);}
.elem-head-toggle{
  display:flex;align-items:center;justify-content:space-between;gap:10px;flex:1;min-width:0;
  text-align:left;border:none;margin:0;padding:12px 14px;background:transparent;cursor:pointer;
  -webkit-tap-highlight-color:transparent;font-family:inherit;font-size:inherit;color:inherit;
}
.elem-head-left{display:flex;align-items:center;gap:10px;min-width:0;}
.elem-icon{width:8px;height:8px;border-radius:50%;background:#c9cfd8;flex:none;}
.elem-icon.filled{background:var(--ok);}
.elem-icon.flag{background:var(--bad);}
.elem-name{font-size:14.5px;font-weight:700;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.elem-badge{font-size:10.5px;color:var(--text-soft);font-weight:600;flex:none;}
.elem-chevron{flex:none;color:var(--text-soft);font-size:13px;transition:transform .15s;}
.elem-chevron.open{transform:rotate(180deg);}
.elem-camera-btn{
  flex:none;width:48px;display:flex;align-items:center;justify-content:center;position:relative;
  border:none;border-left:1px solid var(--line);background:transparent;cursor:pointer;padding:0;
  -webkit-tap-highlight-color:transparent;
}
.camera-icon{font-size:18px;line-height:1;}
.camera-badge{
  position:absolute;top:6px;right:6px;min-width:15px;height:15px;border-radius:8px;
  background:var(--gold);color:#fff;font-size:9.5px;font-weight:700;line-height:15px;
  text-align:center;padding:0 3px;
}
.elem-body{padding:14px;display:none;}
.elem-body.open{display:block;}

.photo-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.photo-thumb{position:relative;width:84px;height:84px;border-radius:7px;overflow:hidden;border:1.5px solid var(--line);flex:none;}
.photo-thumb img{width:100%;height:100%;object-fit:cover;}
.photo-thumb .rm{
  position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:50%;
  background:rgba(20,20,20,.65);color:#fff;border:none;font-size:13px;line-height:1;cursor:pointer;
  display:flex;align-items:center;justify-content:center;padding:0;
}
.photo-add{
  width:84px;height:84px;border-radius:7px;border:1.5px dashed #b7bdc7;background:#fff;color:var(--text-soft);
  display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10.5px;font-weight:600;
  cursor:pointer;gap:3px;flex:none;-webkit-tap-highlight-color:transparent;
}
.photo-add .plus{font-size:20px;line-height:1;}

.absent-row{display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);}
.checkline{display:flex;align-items:center;gap:8px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.checkbox-native{width:19px;height:19px;flex:none;accent-color:var(--navy);}
.checkline span{font-size:13px;color:var(--text-soft);font-weight:600;}

/* ===== Bandeau résumé pièce ===== */
.room-summary{
  display:flex;gap:14px;flex-wrap:wrap;background:#f6f4ec;border:1px solid var(--gold-light);
  border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:12.5px;color:var(--navy);
}
.room-summary b{font-size:14px;}

/* ===== Liste réserves / désordres signés ===== */
.flag-card{border:1.5px solid #e3b9b5;background:#fdf4f3;border-radius:9px;padding:12px 14px;margin-bottom:10px;}
.flag-card .ft{font-size:12px;font-weight:700;color:var(--bad);text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px;}
.flag-card p{margin:0;font-size:13.5px;}

/* ===== Pièces (liste dynamique) ===== */
.room-card{border:1.5px solid var(--line);border-radius:9px;padding:14px;margin-bottom:12px;background:#fff;}
.room-card-top{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.room-card-top h4{margin:0;font-size:15px;color:var(--navy);}
.room-meta{font-size:11.5px;color:var(--text-soft);margin-top:2px;}

/* ===== Signature ===== */
.sigbox{border:1.5px solid var(--line);border-radius:9px;background:#fff;touch-action:none;width:100%;height:160px;}
.sig-actions{display:flex;gap:8px;margin-top:8px;}

/* ===== Footer nav fixe ===== */
.bottombar{
  position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);
  padding:10px 16px;display:flex;gap:10px;justify-content:space-between;align-items:center;z-index:40;
  box-shadow:0 -2px 10px rgba(20,30,50,.07);
}
.bottombar-info{font-size:11.5px;color:var(--text-soft);}

/* ===== Toast ===== */
#toast{
  position:fixed;bottom:78px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--navy);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;
  opacity:0;transition:opacity .25s, transform .25s;z-index:100;pointer-events:none;max-width:90%;text-align:center;
  box-shadow:0 4px 14px rgba(0,0,0,.2);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ===== Modal générique ===== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(15,20,30,.55);display:none;align-items:center;justify-content:center;
  z-index:200;padding:20px;
}
.modal-overlay.show{display:flex;}
.modal-box{background:#fff;border-radius:11px;max-width:480px;width:100%;max-height:85vh;overflow-y:auto;padding:22px;}
.modal-box h3{margin:0 0 10px;color:var(--navy);font-size:17px;}
.modal-box p{font-size:13.5px;color:var(--text-soft);margin:0 0 16px;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;}

.help-pill{display:inline-block;background:#eef1f5;color:var(--text-soft);font-size:10.5px;font-weight:700;
  padding:2px 8px;border-radius:10px;margin-left:6px;vertical-align:middle;}

.empty-state{text-align:center;padding:30px 14px;color:var(--text-soft);}
.empty-state .plus-big{font-size:34px;color:var(--gold);}

.legend-note{font-size:11.5px;color:var(--text-soft);background:#f6f4ec;border:1px solid var(--gold-light);
  border-radius:8px;padding:10px 12px;margin-bottom:16px;}

.photo-hint{font-size:11.5px;color:var(--gold);font-weight:600;margin:0 0 6px;}

@media print{
  .topbar,.bottombar,.section-nav,#toast,.modal-overlay{display:none !important;}
  .shell{padding-bottom:0;}
}
</style>
</head>

       pour les parties interactives).

   ========================================================================== */

"use strict";

/* ---------- Échelles de qualification communes ---------- */

const ETAT_USURE = ["Bon état", "État d'usage", "Dégradé", "Hors d'usage"];
const MENAGE = ["Propre", "Moyen", "Sale", "Très sale / encrassé"];
const FONCTIONNEMENT = ["Fonctionnel", "Fonctionnement dégradé", "Non fonctionnel", "Non testé / non accessible"];

  { v: "0", l: "0 % — Aucun désordre" },
  { v: "25", l: "25 % — Désordres ponctuels / isolés" },

  opts = opts || {};
  return {
    key: key,
    label: label,

/* ---------- Utilitaires divers ---------- */

function uid() {
  return "id" + Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
}

function formatDateTime(d) {
  const p2 = n => String(n).padStart(2, "0");
  return p2(d.getDate()) + "/" + p2(d.getMonth() + 1) + "/" + d.getFullYear() +
    " à " + p2(d.getHours()) + ":" + p2(d.getMinutes());
}

function formatDateFR(isoDateStr) {
  if (!isoDateStr) return "";
  const parts = isoDateStr.split("-");
  if (parts.length !== 3) return isoDateStr;
  return parts[2] + "/" + parts[1] + "/" + parts[0];
}

/* ============================================================================
   HELPERS — Constat plomb (CREP), occupants, repère de sur-occupation CAF
   Ces fonctions sont des aides au constat ; elles n'emportent par
   elles-mêmes aucune qualification juridique. Le résultat affiché reste
   un repère destiné à éclairer l'expert et, le cas échéant, l'autorité
   compétente, qui seule qualifie et décide.
   ============================================================================ */

/* Calcule l'âge en années pleines à la date du jour à partir d'une date de
   naissance au format ISO (YYYY-MM-DD). Retourne null si la date est vide
   ou invalide. */
function ageFromDateNaissance(isoDateStr) {
  if (!isoDateStr) return null;
  const dn = new Date(isoDateStr);
  if (isNaN(dn.getTime())) return null;
  const now = new Date();
  let age = now.getFullYear() - dn.getFullYear();
  const monthDiff = now.getMonth() - dn.getMonth();
  if (monthDiff < 0 || (monthDiff === 0 && now.getDate() < dn.getDate())) age--;
  return age;
}

/* Détermine si le bâti est antérieur à 1949 à partir du champ
   "année de construction" déclaré. Retourne true/false si l'année est
   exploitable, ou null si elle est absente ou non numérique (inconnue). */
function batiAvant1949() {
  const annee = parseInt(STATE.meta.annee_construction, 10);
  if (isNaN(annee) || STATE.meta.annee_construction === "") return null;
  return annee < 1949;
}

/* Détermine si au moins un occupant déclaré a moins de 6 ans à la date du
   jour. Retourne true/false si l'information est exploitable pour tous les
   occupants déclarés, ou null si aucun occupant n'est renseigné ou si une
   date de naissance manque pour au moins un occupant (information incomplète). */
function presenceMineurMoins6Ans() {
  const occupants = STATE.meta.occupants || [];
  if (occupants.length === 0) return null;
  let hasUnknown = false;
  let hasMineur = false;
  occupants.forEach(o => {
    const age = ageFromDateNaissance(o.date_naissance);
    if (age === null) hasUnknown = true;
    else if (age < 6) hasMineur = true;
  });
  if (hasMineur) return true;
  if (hasUnknown) return null;
  return false;
}

/* Synthétise le résultat du test de signalement CREP (CSP, art. R.1331-24)
   à partir des trois conditions cumulatives : bâti avant 1949, dégradation
   de peinture constatée lors de la visite, présence d'un mineur de moins
   de 6 ans. Retourne une chaîne descriptive destinée à l'affichage, jamais
   une qualification juridique définitive. */
function crepSignalementStatus() {
  const avant1949 = batiAvant1949();
  const peintureDeg = STATE.plomb.peinture_degradee_constatee;
  const mineur = presenceMineurMoins6Ans();

  if (avant1949 === false) {
    return { niveau: "non-concerne", texte: "Non concerné en l'état déclaré — bâti postérieur à 1949." };
  }
  if (peintureDeg === "Non — bon état ou absence") {
    return { niveau: "non-concerne", texte: "Aucune dégradation de peinture constatée lors de la présente visite." };
  }
  if (avant1949 === true && peintureDeg === "Oui — dégradation constatée" && mineur === true) {
    return { niveau: "positif", texte: "Signalement à envisager — les trois conditions de l'article R.1331-24 du CSP paraissent réunies (bâti avant 1949, dégradation constatée, présence d'un mineur de moins de 6 ans)." };
  }
  const manquants = [];
  if (avant1949 === null) manquants.push("année de construction non renseignée");
  if (!peintureDeg) manquants.push("constat de dégradation de peinture non renseigné");
  if (mineur === null) manquants.push("composition du foyer non renseignée ou incomplète");
  if (manquants.length > 0) {
    return { niveau: "incomplet", texte: "Test non concluant en l'état — informations manquantes : " + manquants.join(", ") + "." };
  }
  return { niveau: "a-verifier", texte: "Conditions partiellement réunies — à apprécier au cas par cas par l'expert." };
}

/* Surface habitable repère selon la grille CAF de sur-occupation :
   9 m² pour une personne isolée, 16 m² pour deux personnes, + 9 m² par
   personne supplémentaire. Purement informatif, à comparer à la surface
   habitable déclarée sans en tirer de conclusion automatique. */
function surfaceRequiseCAF(nbOccupants) {
  if (!nbOccupants || nbOccupants <= 0) return null;
  if (nbOccupants === 1) return 9;
  if (nbOccupants === 2) return 16;
  return 16 + (nbOccupants - 2) * 9;
}

let toastTimer = null;
function showToast(msg, duration) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), duration || 2200);
}

}

/* ---------- Helpers de construction DOM (jamais d'innerHTML pour l'interactif) ---------- */

function el(tag, attrs, children) {
  const node = document.createElement(tag);
  if (attrs) {
    for (const k in attrs) {
      if (k === "class") node.className = attrs[k];
      else if (k === "text") node.textContent = attrs[k];
      else if (k === "html_SAFE_STATIC_ONLY") node.innerHTML = attrs[k]; // réservé aux libellés statiques non interactifs
      else if (k.startsWith("data-")) node.setAttribute(k, attrs[k]);
      else node.setAttribute(k, attrs[k]);
    }
  }
  if (children) {
    (Array.isArray(children) ? children : [children]).forEach(c => {
      if (c === null || c === undefined) return;
      if (typeof c === "string") node.appendChild(document.createTextNode(c));
      else node.appendChild(c);
    });
  }
  return node;
}

function clearNode(node) {
  while (node.firstChild) node.removeChild(node.firstChild);
}

/* Construit un champ texte standard, lié à un objet/clé donné, avec
   sauvegarde automatique au "input" et au "blur". */
function buildTextField(labelText, getValue, setValue, opts) {
  opts = opts || {};
  const wrap = el("div", { class: "field" });
  wrap.appendChild(el("label", { text: labelText }));
  let input;
  if (opts.textarea) {
    input = el("textarea", { rows: opts.rows || 3, placeholder: opts.placeholder || "" });
  } else {
    input = el("input", { type: opts.type || "text", placeholder: opts.placeholder || "" });
  }
  input.value = getValue() || "";
  input.addEventListener("input", () => { setValue(input.value); });
  input.addEventListener("blur", () => { saveState(); });
  wrap.appendChild(input);
  if (opts.hint) wrap.appendChild(el("span", { class: "hint", text: opts.hint }));
  return wrap;
}

/* Construit un sélecteur "segmenté" (boutons natifs) pour choix unique. */
function buildSegField(labelText, options, getValue, setValue, toneFn) {
  const wrap = el("div", { class: "field" });
  wrap.appendChild(el("label", { text: labelText }));
  const seg = el("div", { class: "seg" });
  options.forEach(opt => {
    const value = typeof opt === "string" ? opt : opt.v;
    const text = typeof opt === "string" ? opt : opt.l;
    const btn = el("button", { type: "button", class: "seg-btn", text: text });
    if (getValue() === value) {
      btn.classList.add("sel");
      if (toneFn) { const tone = toneFn(value); if (tone) btn.classList.add("tone-" + tone); }
    }
    btn.addEventListener("click", () => {
      setValue(value);
      saveState();
      // re-render léger : on remet à jour les classes du groupe seg seulement
      Array.from(seg.children).forEach(b => b.classList.remove("sel", "tone-ok", "tone-warn", "tone-bad"));
      btn.classList.add("sel");
      if (toneFn) { const tone = toneFn(value); if (tone) btn.classList.add("tone-" + tone); }
      if (opt.onSelect) opt.onSelect();
    });
    seg.appendChild(btn);
  });
  wrap.appendChild(seg);
  return wrap;
}

/* Construit une case à cocher native avec libellé. */
function buildCheckline(labelText, getValue, setValue) {
  const label = el("label", { class: "checkline" });
  const input = el("input", { type: "checkbox", class: "checkbox-native" });
  input.checked = !!getValue();
  input.addEventListener("change", () => { setValue(input.checked); saveState(); });
  label.appendChild(input);
  label.appendChild(el("span", { text: labelText }));
  return label;
}

/* ============================================================================
   GESTION DES PHOTOS
   Les photos sont compressées côté client (redimensionnement + JPEG) avant
   stockage en base64 dans le state, afin de limiter l'empreinte mémoire
   du localStorage et la taille des exports.
   ============================================================================ */

const PHOTO_MAX_DIM = 1280;
const PHOTO_QUALITY = 0.72;

function compressImageFile(file, callback) {
  const reader = new FileReader();
  reader.onload = function (e) {
    const img = new Image();
    img.onload = function () {
      let w = img.width, h = img.height;
      if (w > PHOTO_MAX_DIM || h > PHOTO_MAX_DIM) {
        if (w >= h) { h = Math.round(h * PHOTO_MAX_DIM / w); w = PHOTO_MAX_DIM; }
        else { w = Math.round(w * PHOTO_MAX_DIM / h); h = PHOTO_MAX_DIM; }
      }
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL("image/jpeg", PHOTO_QUALITY);
      callback(dataUrl);
    };
    img.onerror = function () { callback(null); };
    img.src = e.target.result;
  };
  reader.onerror = function () { callback(null); };
  reader.readAsDataURL(file);
}

/* Crée un champ de saisie fichier caché, préconfiguré pour ouvrir
   directement l'appareil photo de l'appareil (capture="environment") et
   compresser l'image avant de la transmettre au callback onCaptured.
   L'input doit être inséré dans le DOM (même masqué via display:none) pour
   garantir un déclenchement fiable de .click() sur l'ensemble des
   navigateurs mobiles. Réutilisé par buildPhotoRow (rangée complète dans la
   fiche dépliée) et buildQuickCameraButton (icône compacte sur l'en-tête). */
function createPhotoCaptureInput(onCaptured) {
  const fileInput = el("input", { type: "file", accept: "image/*", capture: "environment", style: "display:none;" });
  fileInput.addEventListener("change", () => {
    const file = fileInput.files && fileInput.files[0];
    if (!file) return;
    compressImageFile(file, dataUrl => {
      if (dataUrl) {
        onCaptured(dataUrl);
      } else {
        showToast("Impossible de charger cette image.");
      }
    });
    fileInput.value = "";
  });
  return fileInput;
}

/* Construit un rang de miniatures + bouton d'ajout, relié à un tableau
   `photosArray` (référence directe dans le state). */
function buildPhotoRow(photosArray, onChange) {
  const row = el("div", { class: "photo-row" });

  function renderThumbs() {
    clearNode(row);
    photosArray.forEach((photo, idx) => {
      const thumb = el("div", { class: "photo-thumb" });
      const img = el("img", { src: photo.data, alt: "Photo " + (idx + 1) });
      const rm = el("button", { type: "button", class: "rm", text: "✕" });
      rm.addEventListener("click", () => {
        photosArray.splice(idx, 1);
        renderThumbs();
        saveState();
        if (onChange) onChange();
      });
      thumb.appendChild(img);
      thumb.appendChild(rm);
      row.appendChild(thumb);
    });

    const addBtn = el("button", { type: "button", class: "photo-add" });
    addBtn.appendChild(el("span", { class: "plus", text: "+" }));
    addBtn.appendChild(el("span", { text: "Photo" }));
    const fileInput = createPhotoCaptureInput(dataUrl => {
      photosArray.push({ data: dataUrl, ts: new Date().toISOString() });
      renderThumbs();
      saveState();
      if (onChange) onChange();
    });
    addBtn.addEventListener("click", () => fileInput.click());
    row.appendChild(addBtn);
    row.appendChild(fileInput);
  }

  renderThumbs();
  return row;
}

/* ============================================================================
   RENDU — NAVIGATION DES SECTIONS
   ============================================================================ */

function renderSectionNav() {
  const nav = document.getElementById("sectionNav");
  clearNode(nav);
  SECTIONS.forEach(sec => {
    const chip = el("button", { type: "button", class: "navchip" });
    if (sec.key === UI.activeSection) chip.classList.add("active");
    if (sectionIsComplete(sec.key)) chip.classList.add("done");
    chip.appendChild(el("span", { class: "dot" }));
    chip.appendChild(document.createTextNode(sec.label));
    chip.addEventListener("click", () => {
      UI.activeSection = sec.key;
      renderApp();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
    nav.appendChild(chip);
  });
}

function sectionIsComplete(key) {
  switch (key) {
    case "identification":
      return !!(STATE.meta.adresse && STATE.meta.date_visite && STATE.meta.type_bien);
    case "reseaux":
      return RESEAUX_GENERAUX.every(r => STATE.reseaux[r.key] && Object.keys(STATE.reseaux[r.key]).length > 0);
    case "decence":
      return CRITERES_DECENCE.every(c => STATE.decence[c.key] && STATE.decence[c.key].gravite);
    case "insalubrite":
      return true; // section informative, jamais bloquante
    case "pieces":
      return STATE.rooms.length > 0;
    case "reserves":
      return true;
    case "signatures":
      return !!(STATE.signatures.expert);
    default:
      return false;
  }
}

function updateProgressBar() {
  const total = SECTIONS.length;
  const done = SECTIONS.filter(s => sectionIsComplete(s.key)).length;
  const pct = Math.round((done / total) * 100);
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("progressLabel").textContent = pct + " % complété — " + done + "/" + total + " sections";
}

function gotoSection(delta) {
  const idx = SECTIONS.findIndex(s => s.key === UI.activeSection);
  const next = idx + delta;
  if (next >= 0 && next < SECTIONS.length) {
    UI.activeSection = SECTIONS[next].key;
    renderApp();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }
}

/* ============================================================================
   RENDU PRINCIPAL — dispatch vers la bonne section
   ============================================================================ */

function renderApp() {
  renderSectionNav();
  updateProgressBar();
  const root = document.getElementById("appRoot");
  clearNode(root);

  switch (UI.activeSection) {
    case "identification": root.appendChild(renderIdentification()); break;
    case "reseaux": root.appendChild(renderReseaux()); break;
    case "decence": root.appendChild(renderDecence()); break;
    case "insalubrite": root.appendChild(renderInsalubrite()); break;
    case "pieces": root.appendChild(renderPieces()); break;
    case "reserves": root.appendChild(renderReserves()); break;
    case "signatures": root.appendChild(renderSignatures()); break;
  }

  const idx = SECTIONS.findIndex(s => s.key === UI.activeSection);
  document.getElementById("btnPrevSection").disabled = idx <= 0;
  document.getElementById("btnNextSection").disabled = idx >= SECTIONS.length - 1;
}

/* Détermine une teinte indicative (ok/warn/bad) pour des libellés
   fréquents, afin d'aider visuellement la saisie sans porter de
   jugement juridique — purement un repère de lecture pour l'expert. */
function toneForGenericValue(value) {
  const v = (value || "").toLowerCase();
  const badWords = ["absent", "non fonctionnel", "insuffisant", "bouché", "dangereuse", "non conforme", "hors service", "obstrué", "non décent", "non conforme"];
  const warnWords = ["partiel", "dégradé", "vétusté", "ponctuel", "douteuse", "ralenti", "lent", "limité", "insuffisante", "fonctionnement dégradé"];
  const okWords = ["bon état", "fonctionnel", "présent", "conforme", "continue", "suffisante", "présente et fonctionnel", "dégagés", "normaux", "normal", "oui, privatif"];
  if (badWords.some(w => v.includes(w))) return "bad";
  if (warnWords.some(w => v.includes(w))) return "warn";
  if (okWords.some(w => v.includes(w))) return "ok";
  return null;
}

/* ============================================================================
   SECTION — INVENTAIRE DES PIÈCES
   Cœur de l'état des lieux : chaque pièce ajoutée est instanciée depuis un
   gabarit ROOM_TEMPLATES ; chaque élément du gabarit devient une fiche
   dépliable avec le détail complet (Nature / Consistance / Destination /
   État d'usure / Ménage / Couleur / Fonctionnement / Ampleur / Observations
   / Photos / Absent-Sans objet).
   ============================================================================ */

function emptyElementData() {
  return {
    absent: false,
    nature: "",
    consistance: "",
    destination: "",
    etat_usure: "",
    menage: "",
    couleur: "",
    fonctionnement: "",
    ampleur: "",
    observations: "",
    photos: []
  };
}

function createRoom(templateKey) {
  const tpl = ROOM_TEMPLATES[templateKey];
  const room = {
    id: uid(),
    templateKey: templateKey,
    customLabel: "",
    elements: {}
  };
  tpl.elements.forEach(e => { room.elements[e.key] = emptyElementData(); });
  return room;
}

function roomDisplayName(room) {
  const tpl = ROOM_TEMPLATES[room.templateKey];
  return room.customLabel ? (tpl.label + " — " + room.customLabel) : tpl.label;
}

function roomCompletionStats(room) {
  const tpl = ROOM_TEMPLATES[room.templateKey];
  let filled = 0, flagged = 0;
  tpl.elements.forEach(e => {
    const d = room.elements[e.key];
    if (!d) return;
    if (d.absent) { filled++; return; }
    if (d.etat_usure || d.observations || d.nature) filled++;
    if (d.etat_usure === "Dégradé" || d.etat_usure === "Hors d'usage" || (d.fonctionnement && d.fonctionnement.indexOf("Non fonctionnel") === 0)) flagged++;
  });
  return { total: tpl.elements.length, filled: filled, flagged: flagged };
}

function renderPieces() {
  const wrap = el("div", {});

  const card = el("div", { class: "card" });
  card.appendChild(el("h2", { text: "Inventaire des pièces" }));

function renderRoomCard(room, roomIdx) {

  card.appendChild(buildTextField("Identifiant de la pièce (si plusieurs pièces du même type)", () => room.customLabel, v => room.customLabel = v,
    { placeholder: "Ex. « chambre 1 », « cave principale »…" }));

  tpl.elements.forEach(elemDef => {
    card.appendChild(renderElementFicheCard(room, elemDef));
  });

}

function renderElementFicheCard(room, elemDef) {
  const data = room.elements[elemDef.key];
  const boxKey = room.id + "::" + elemDef.key;
  const isOpen = UI.openElemKeys.has(boxKey);

  const box = el("div", { class: "elem-card" });

  // L'en-tête contient désormais DEUX zones cliquables distinctes, chacune
  // un <button> natif : le bouton de bascule (dépliage de la fiche) et le
  // bouton appareil photo rapide. Le conteneur englobant devient donc un
  // simple <div> de mise en page SANS gestionnaire de clic propre — seuls
  // les deux <button> qu'il contient sont réellement interactifs. On ne
  // peut pas imbriquer un <button> dans un autre <button> (HTML invalide,
  // comportement de rendu imprévisible), d'où cette restructuration en
  // boutons frères plutôt qu'un bouton unique englobant tout l'en-tête.
  // Le principe "boutons natifs uniquement" (jamais de <div> cliquable,
  // pour fiabilité tactile sur iPad Safari) reste strictement respecté :
  // c'est seulement le découpage en deux zones qui change.
  const head = el("div", { class: "elem-head" + (isOpen ? " open" : "") });

  const toggleBtn = el("button", { type: "button", class: "elem-head-toggle" });
  const left = el("div", { class: "elem-head-left" });
  const iconCls = data.absent ? "elem-icon" : (filledLevelIcon(data));
  left.appendChild(el("span", { class: iconCls }));
  left.appendChild(el("span", { class: "elem-name", text: elemDef.label }));
  if (elemDef.majeur) left.appendChild(el("span", { class: "elem-badge", text: "élément majeur" }));
  toggleBtn.appendChild(left);

  const rightHead = el("div", { style: "display:flex;align-items:center;gap:8px;" });
  if (data.absent) rightHead.appendChild(el("span", { class: "elem-badge", text: "absent / SO" }));
  rightHead.appendChild(el("span", { class: "elem-chevron" + (isOpen ? " open" : ""), text: "▾" }));
  toggleBtn.appendChild(rightHead);

  toggleBtn.addEventListener("click", () => {
    if (UI.openElemKeys.has(boxKey)) UI.openElemKeys.delete(boxKey);
    else UI.openElemKeys.add(boxKey);
    renderApp();
  });
  head.appendChild(toggleBtn);

  if (!data.absent) {
    const quickCam = buildQuickCameraButton(data);
    head.appendChild(quickCam.button);
    head.appendChild(quickCam.fileInput);
  }

  box.appendChild(head);

  const body = el("div", { class: "elem-body" + (isOpen ? " open" : "") });
  if (isOpen) {
    body.appendChild(renderElementFicheBody(data, elemDef));
  }
  box.appendChild(body);

  return box;
}

/* Bouton appareil photo compact, visible directement sur l'en-tête (replié
   ou déplié) de chaque point examiné, sans nécessiter l'ouverture de la
   fiche complète. Un appui ouvre directement l'appareil photo de l'appareil
   (cf. createPhotoCaptureInput) ; un badge affiche le nombre de photos déjà
   attachées à cet élément.

   IMPORTANT — retourne le bouton ET le champ de saisie SÉPARÉMENT plutôt que
   d'imbriquer le second dans le premier : un <button> ne peut valablement
   contenir aucun contenu interactif (un <input> en est un au sens du modèle
   de contenu HTML). Chromium tolère cette imbrication sans rien signaler,
   mais WebKit/Safari peut s'avérer plus strict et ne pas déclencher
   l'événement de façon fiable au toucher — exactement la même famille de
   problème que les <div> cliquables ayant posé difficulté par le passé sur
   iPad. L'appelant insère donc les deux comme FRÈRES dans un même
   conteneur, jamais l'un dans l'autre, sur le modèle déjà éprouvé de
   buildPhotoRow (bouton "+ Photo" et champ de saisie également frères). */
function buildQuickCameraButton(data) {
  const btn = el("button", { type: "button", class: "elem-camera-btn", title: "Ajouter une photo à cet élément" });
  btn.appendChild(el("span", { class: "camera-icon", text: "📷" }));
  if (data.photos && data.photos.length > 0) {
    btn.appendChild(el("span", { class: "camera-badge", text: String(data.photos.length) }));
  }

  const fileInput = createPhotoCaptureInput(dataUrl => {
    data.photos.push({ data: dataUrl, ts: new Date().toISOString() });
    saveState();
    renderApp();
  });

  btn.addEventListener("click", evt => {
    evt.stopPropagation();
    fileInput.click();
  });

  return { button: btn, fileInput: fileInput };
}

function filledLevelIcon(data) {
  if (data.etat_usure === "Dégradé" || data.etat_usure === "Hors d'usage") return "elem-icon flag";
  if (data.nature || data.observations || data.etat_usure) return "elem-icon filled";
  return "elem-icon";
}

  if (elemDef.majeur && data.photos.length === 0) {
    wrap.appendChild(el("p", { class: "photo-hint",
      text: "📷 Photo recommandée pour cet élément (sécurité ou conformité sensible) — y compris en l'absence de désordre, à titre de preuve d'état, conforme ou non." }));
  }
  wrap.appendChild(buildPhotoRow(data.photos, () => renderApp()));

  return wrap;
}

function toneForEtatUsure(v) {
  if (v === "Bon état") return "ok";
  if (v === "État d'usage") return "warn";
  if (v === "Dégradé" || v === "Hors d'usage") return "bad";
  return null;
}
function toneForMenage(v) {
  if (v === "Propre") return "ok";
  if (v === "Moyen") return "warn";
  return "bad";
}
function toneForFonctionnement(v) {
  if (v === "Fonctionnel") return "ok";
  if (v === "Fonctionnement dégradé") return "warn";
  if (v === "Non fonctionnel") return "bad";
  return null;
}
function toneForAmpleur(v) {
  if (v === "0") return "ok";
  if (v === "25") return "warn";
  if (v === "50" || v === "100") return "bad";
  return null;
}

function setupSignatureCanvas(canvas, clearBtn, saveBtn, onSave) {
  // Dimensionnement réel du canevas en fonction de sa taille CSS (évite le flou).
  // IMPORTANT : au moment où cette fonction est appelée (juste après la
  // construction du nœud <canvas>), celui-ci n'est encore attaché qu'à un
  // fragment de DOM détaché (card), pas au document réel — getBoundingClientRect()
  // y renverrait {width:0, height:0} et le canvas serait dimensionné à 0x0,
  // rendant tout dessin invisible et l'export toDataURL() vide. On reporte
  // donc le dimensionnement via requestAnimationFrame, après que l'appelant
  // ait eu l'occasion d'attacher la carte au document et que le layout ait
  // été calculé.
  let sized = false;
  function fitCanvas() {
    const rect = canvas.getBoundingClientRect();
    if (rect.width === 0 || rect.height === 0) {
      // Le nœud n'est toujours pas visible/layouté : on réessaie au prochain frame
      // plutôt que de figer un canevas à 0x0.
      requestAnimationFrame(fitCanvas);
      return;
    }
    const ratio = window.devicePixelRatio || 1;
    canvas.width = rect.width * ratio;
    canvas.height = rect.height * ratio;
    const ctx = canvas.getContext("2d");
    ctx.scale(ratio, ratio);
    ctx.lineWidth = 2;
    ctx.lineCap = "round";
    ctx.strokeStyle = "#13294b";
    sized = true;
  }
  requestAnimationFrame(fitCanvas);

  let drawing = false;
  let last = { x: 0, y: 0 };

  function getPos(evt) {
    const rect = canvas.getBoundingClientRect();
    const point = evt.touches ? evt.touches[0] : evt;
    return { x: point.clientX - rect.left, y: point.clientY - rect.top };
  }

  function start(evt) {
    if (!sized) return; // canvas pas encore dimensionné (cas limite très rare)
    evt.preventDefault();
    drawing = true;
    last = getPos(evt);
  }
  function move(evt) {
    if (!drawing) return;
    evt.preventDefault();
    const pos = getPos(evt);
    const ctx = canvas.getContext("2d");
    ctx.beginPath();
    ctx.moveTo(last.x, last.y);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    last = pos;
  }
  function end(evt) { drawing = false; }

  canvas.addEventListener("mousedown", start);
  canvas.addEventListener("mousemove", move);
  canvas.addEventListener("mouseup", end);
  canvas.addEventListener("mouseleave", end);
  canvas.addEventListener("touchstart", start, { passive: false });
  canvas.addEventListener("touchmove", move, { passive: false });
  canvas.addEventListener("touchend", end);

  clearBtn.addEventListener("click", () => {
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  });

  saveBtn.addEventListener("click", () => {
    onSave(canvas.toDataURL("image/png"));
  });
}

/* ============================================================================
   MODAL GÉNÉRIQUE (confirmation, menu d'export)
   ============================================================================ */

function openModal(buildFn) {
  const overlay = document.getElementById("modalOverlay");
  const box = document.getElementById("modalBox");
  clearNode(box);
  buildFn(box, closeModal);
  overlay.classList.add("show");
}

function closeModal() {
  document.getElementById("modalOverlay").classList.remove("show");
}

function openConfirmModal(title, message, onConfirm) {
  openModal((box, close) => {
    box.appendChild(el("h3", { text: title }));
    box.appendChild(el("p", { text: message }));
    const actions = el("div", { class: "modal-actions" });
    const cancelBtn = el("button", { type: "button", class: "btn btn-line", text: "Annuler" });
    cancelBtn.addEventListener("click", close);
    const okBtn = el("button", { type: "button", class: "btn btn-danger", text: "Confirmer la suppression" });
    okBtn.addEventListener("click", () => { onConfirm(); close(); });
    actions.appendChild(cancelBtn);
    actions.appendChild(okBtn);
    box.appendChild(actions);
  });
}

document.getElementById("modalOverlay").addEventListener("click", (evt) => {
  if (evt.target.id === "modalOverlay") closeModal();
});

function openExportModal() {
  openModal((box, close) => {
    box.appendChild(el("h3", { text: "Exporter le rapport" }));
    box.appendChild(el("p", { text: "Choisissez le format d'export du constat technique." }));
    const actions = el("div", { class: "modal-actions", style: "flex-direction:column;align-items:stretch;" });

    const btnPrint = el("button", { type: "button", class: "btn btn-gold", text: "🖨️ Aperçu impression / PDF" });
    btnPrint.addEventListener("click", () => { close(); exportPrintView(); });

    const btnDocx = el("button", { type: "button", class: "btn btn-line", text: "📄 Générer le document Word (.docx)" });
    btnDocx.addEventListener("click", () => { close(); exportDocx(); });

    const btnJson = el("button", { type: "button", class: "btn btn-line", text: "💾 Sauvegarder la saisie (.json)" });
    btnJson.addEventListener("click", () => { close(); exportJson(); });

    const btnImportLbl = el("button", { type: "button", class: "btn btn-line", text: "📂 Reprendre une saisie (.json)" });
    btnImportLbl.addEventListener("click", () => { close(); document.getElementById("hiddenFileImport").click(); });

    actions.appendChild(btnPrint);
    actions.appendChild(btnDocx);
    actions.appendChild(btnJson);
    actions.appendChild(btnImportLbl);

    const cancelRow = el("div", { class: "modal-actions", style: "margin-top:6px;" });
    const cancelBtn = el("button", { type: "button", class: "btn btn-line", text: "Fermer" });
    cancelBtn.addEventListener("click", close);
    cancelRow.appendChild(cancelBtn);

    box.appendChild(actions);
    box.appendChild(cancelRow);
  });
}

/* ============================================================================
   MOTEUR DE GÉNÉRATION DU RAPPORT
   Construit une représentation structurée unique du rapport (liste de
   "blocs"), consommée ensuite par les deux exports (impression/PDF et
   Word .docx) afin d'éviter toute divergence de contenu entre formats.
   Types de blocs : heading1, heading2, heading3, paragraph, keyvalue,
   table, photoGrid, signatureBlock, pagebreak.
   ============================================================================ */

function buildReportBlocks() {
  const blocks = [];
  const m = STATE.meta;

  blocks.push({ type: "title", text: "ÉTAT DES LIEUX TECHNIQUE CONTRADICTOIRE" });
  blocks.push({ type: "subtitle", text: (m.cabinet_nom || "CEL-47") + " — " + (m.cabinet_adresse || "Laplume (47310)") });
  blocks.push({ type: "subtitle", text: "Document établi selon le décret n°2002-120 du 30 janvier 2002, la loi n°89-462 du 6 juillet 1989 et les articles L.1331-22 et suivants du Code de la santé publique." });

  blocks.push({ type: "heading1", text: "1. Identification de la mission" });
  blocks.push({ type: "keyvalue", rows: [
    ["Référence / lettre de mission", m.reference_mission],
    ["Type d'intervention", m.type_intervention],
    ["Date de la visite", formatDateFR(m.date_visite)],
    ["Heure de la visite", m.heure_visite],
    ["Expert / technicien rédacteur", m.expert_nom],
    ["Cabinet", m.cabinet_nom],
    ["SIRET", m.expert_siret]
  ]});

  blocks.push({ type: "heading1", text: "2. Localisation et caractéristiques du logement" });
  blocks.push({ type: "keyvalue", rows: [
    ["Adresse", [m.adresse, m.complement_adresse].filter(Boolean).join(" — ")],
    ["Code postal / Ville", [m.code_postal, m.ville].filter(Boolean).join(" ")],
    ["Type de bien", m.type_bien],
    ["Année de construction", m.annee_construction],
    ["Étage", m.etage],
    ["Surface habitable déclarée", m.surface_habitable ? m.surface_habitable + " m²" : ""],
    ["Nombre de pièces principales", m.nb_pieces_principales],
    ["Classe DPE", m.dpe_classe],
    ["Consommation DPE", m.dpe_valeur ? m.dpe_valeur + " kWhep/m².an" : ""]
  ]});

  blocks.push({ type: "heading2", text: "Qualification préalable du logement" });
  blocks.push({ type: "keyvalue", rows: [
    ["Locaux par nature potentiellement impropres à l'habitation", m.qualif_locaux_impropres || "Non renseigné"],
    ["Précision", m.locaux_impropres_observations || ""]
  ]});

  blocks.push({ type: "heading2", text: "Diagnostics annexés au dossier (si disponibles)" });
  blocks.push({ type: "keyvalue", rows: [
    ["Diagnostic électricité — date", formatDateFR(m.diag_elec_date) || "Non communiqué"],
    ["Diagnostic électricité — conclusions", m.diag_elec_conclusions || ""],
    ["Diagnostic gaz — date", formatDateFR(m.diag_gaz_date) || "Non communiqué"],
    ["Diagnostic gaz — conclusions", m.diag_gaz_conclusions || ""],
    ["CREP existant annexé au bail — date", formatDateFR(m.crep_existant_date) || "Non communiqué"],
    ["CREP existant — résultat", m.crep_existant_resultat || "Non renseigné"],
    ["Repérage amiante existant — date", formatDateFR(m.amiante_existant_date) || "Non communiqué"],
    ["Repérage amiante — résultat", m.amiante_existant_resultat || "Non renseigné"],
    ["État des risques (ERP) — date", formatDateFR(m.erp_date) || "Non communiqué"],
    ["État des risques (ERP) — risque(s) identifié(s)", m.erp_risques_identifies || "Non renseigné"]
  ]});

  blocks.push({ type: "heading1", text: "3. Conditions de la visite" });
  blocks.push({ type: "keyvalue", rows: [
    ["Conditions météo", m.meteo],
    ["Température extérieure", m.temperature_ext ? m.temperature_ext + " °C" : ""],
    ["Hygrométrie intérieure mesurée", m.hygrometrie ? m.hygrometrie + " %" : ""],
    ["Température intérieure mesurée", m.thermometrie ? m.thermometrie + " °C" : ""]
  ]});
  const presents = [];
  if (m.presence_parties.bailleur) presents.push("Bailleur / propriétaire");
  if (m.presence_parties.locataire) presents.push("Locataire / occupant");
  if (m.presence_parties.mandataire) presents.push("Mandataire");
  if (m.presence_parties.tiers) presents.push("Tiers" + (m.presence_tiers_precision ? " (" + m.presence_tiers_precision + ")" : ""));
  blocks.push({ type: "keyvalue", rows: [["Parties présentes", presents.join(", ") || "Non renseigné"]] });

  blocks.push({ type: "heading1", text: "4. Identité des parties" });
  blocks.push({ type: "keyvalue", rows: [
    ["Bailleur", [m.bailleur_nom, m.bailleur_adresse, m.bailleur_contact].filter(Boolean).join(" — ")],
    ["Occupant", [m.occupant_nom, m.occupant_contact].filter(Boolean).join(" — ")],
    ["Mandataire", m.mandataire_nom]
  ]});

  if (m.observations_generales) {
    blocks.push({ type: "heading2", text: "Observations générales préliminaires" });
    blocks.push({ type: "paragraph", text: m.observations_generales });
  }

  // --- Occupants et qualification de sur-occupation (repère CAF) ---
  blocks.push({ type: "heading1", text: "5. Occupants du logement" });
  if (m.occupants && m.occupants.length > 0) {
    const occRows = m.occupants.map((o, i) => {
      const age = ageFromDateNaissance(o.date_naissance);
      return [o.nom || ("Occupant " + (i + 1)), formatDateFR(o.date_naissance) + (age !== null ? " (" + age + " an" + (age > 1 ? "s" : "") + ")" : "")];
    });
    blocks.push({ type: "keyvalue", rows: occRows });
    const requise = surfaceRequiseCAF(m.occupants.length);
    blocks.push({ type: "keyvalue", rows: [
      ["Repère de surface (grille CAF)", requise + " m² pour " + m.occupants.length + " occupant(s)"],
      ["Surface habitable déclarée", m.surface_habitable ? m.surface_habitable + " m²" : "Non renseignée"]
    ]});
    blocks.push({ type: "paragraph", text: "Comparaison purement informative, donnée à titre de repère ; elle n'emporte aucune qualification automatique de sur-occupation.", italic: true });
  } else {
    blocks.push({ type: "paragraph", text: "Composition du foyer non renseignée lors de la présente visite.", italic: true });
  }

  // --- Réseaux généraux ---
  blocks.push({ type: "heading1", text: "6. Réseaux et équipements généraux" });
  RESEAUX_GENERAUX.forEach(group => {
    const data = STATE.reseaux[group.key] || {};
    const rows = group.questions.map(q => [q.label, data[q.key] || ""]).filter(r => r[1]);
    if (rows.length === 0) return;
    blocks.push({ type: "heading2", text: group.label });
    blocks.push({ type: "keyvalue", rows: rows });
  });

  // --- Critères de décence : les 8 critères sont systématiquement listés,
  // y compris ceux non vérifiés ou jugés conformes, afin de documenter
  // aussi bien les conformités que les désordres. ---
  blocks.push({ type: "heading1", text: "7. Critères de décence (décret n°2002-120 du 30 janvier 2002)" });
  CRITERES_DECENCE.forEach(crit => {
    const data = STATE.decence[crit.key] || {};
    blocks.push({ type: "heading3", text: crit.label });
    blocks.push({ type: "paragraph", text: crit.desc, italic: true });
    blocks.push({ type: "keyvalue", rows: [["État constaté", data.gravite || "Non vérifié"], ["Observations", data.obs || "—"]] });
  });

  // --- Constat de Risque d'Exposition au Plomb (CREP) — toujours présent ---
  blocks.push({ type: "heading1", text: "8. Constat de Risque d'Exposition au Plomb (CREP) — visite du jour" });
  blocks.push({ type: "paragraph", text: "L'obligation de CREP s'applique à tout logement construit avant le 1er janvier 1949 et/ou mis en location après le 12 août 2008 (Code de la santé publique, art. R.1331-24). Le signalement repose sur trois conditions cumulatives : bâti avant 1949, dégradation de peinture constatée, présence d'un mineur de moins de 6 ans.", italic: true });
  const avant1949Export = batiAvant1949();
  const mineurExport = presenceMineurMoins6Ans();
  blocks.push({ type: "keyvalue", rows: [
    ["Bâti antérieur à 1949 (déclaratif)", avant1949Export === true ? "Oui" : avant1949Export === false ? "Non" : "Non renseigné"],
    ["Présence d'un mineur de moins de 6 ans au foyer", mineurExport === true ? "Oui" : mineurExport === false ? "Non" : "Non renseigné ou incomplet"],
    ["Dégradation de peinture constatée lors de la présente visite", STATE.plomb.peinture_degradee_constatee || "Non vérifié"],
    ["Observations", STATE.plomb.observations || "—"]
  ]});
  blocks.push({ type: "paragraph", text: crepSignalementStatus().texte });
  if (STATE.plomb.photos && STATE.plomb.photos.length) {
    blocks.push({ type: "photoGrid", photos: STATE.plomb.photos, caption: "Constat de Risque d'Exposition au Plomb (CREP)" });
  }

  // --- Indices d'insalubrité : les critères sont systématiquement listés
  // avec leur état explicite (relevé / non relevé), y compris en l'absence
  // de tout indice, afin de documenter aussi les conformités. ---
  blocks.push({ type: "heading1", text: "9. Indices d'insalubrité examinés (CSP, art. L.1331-22 et suivants)" });
  blocks.push({ type: "paragraph", text: "Ce repérage est un outil de constat technique ; il ne constitue ni une qualification d'insalubrité, ni une décision administrative, lesquelles relèvent exclusivement de l'autorité compétente (ARS, mairie, préfecture).", italic: true });
  const insalubriteRows = CRITERES_INSALUBRITE.map(c => {
    const data = STATE.insalubrite[c.key] || {};
    return [c.label, data.coche ? ("Indice relevé" + (data.obs ? " — " + data.obs : "")) : "Non relevé"];
  });
  blocks.push({ type: "keyvalue", rows: insalubriteRows });

  // --- Précarité énergétique (repérage), toujours listée intégralement ---
  blocks.push({ type: "heading1", text: "10. Précarité énergétique (repérage)" });
  const precariteRows = CRITERES_PRECARITE.map(c => {
    const data = STATE.precarite[c.key] || {};
    return [c.label, data.coche ? ("Signalé" + (data.obs ? " — " + data.obs : "")) : "Non signalé"];
  });
  blocks.push({ type: "keyvalue", rows: precariteRows });

  // --- Inventaire des pièces ---
  blocks.push({ type: "heading1", text: "11. Inventaire technique des pièces" });
  STATE.rooms.forEach((room, idx) => {
    const tpl = ROOM_TEMPLATES[room.templateKey];
    blocks.push({ type: "heading2", text: (idx + 1) + ". " + roomDisplayName(room) });

    tpl.elements.forEach(elemDef => {
      const data = room.elements[elemDef.key];
      if (!data) return;
      if (data.absent) {
        blocks.push({ type: "elementAbsent", label: elemDef.label, note: data.observations });
        return;
      }
      const hasContent = data.nature || data.consistance || data.destination || data.etat_usure ||
        data.menage || data.fonctionnement || data.observations || (data.photos && data.photos.length);
      if (!hasContent) return;

      const rows = [];
      if (data.nature) rows.push(["Nature", data.nature]);
      if (data.consistance) rows.push(["Consistance", data.consistance]);
      if (data.destination) rows.push(["Destination", data.destination]);
      if (data.etat_usure) rows.push(["État d'usure", data.etat_usure]);
      if (data.menage) rows.push(["Ménage / propreté", data.menage]);
      if (data.couleur) rows.push(["Couleur", data.couleur]);
      if (data.fonctionnement) rows.push(["Fonctionnement", data.fonctionnement]);
      if (data.ampleur) rows.push(["Ampleur du désordre", ampleurLabelFromValue(data.ampleur)]);

      blocks.push({ type: "heading3", text: elemDef.label });
      blocks.push({ type: "keyvalue", rows: rows });
      if (data.observations) blocks.push({ type: "paragraph", text: data.observations });
      if (data.photos && data.photos.length) blocks.push({ type: "photoGrid", photos: data.photos, caption: elemDef.label + " — " + roomDisplayName(room) });
    });
  });

  // --- Réserves transversales ---
  if (STATE.reserves.length > 0) {
    blocks.push({ type: "heading1", text: "12. Réserves et désordres transversaux" });
    STATE.reserves.forEach((res, idx) => {
      blocks.push({ type: "heading2", text: "Réserve n°" + (idx + 1) + (res.titre ? " — " + res.titre : "") });
      if (res.localisation) blocks.push({ type: "keyvalue", rows: [["Localisation", res.localisation]] });
      if (res.constat) { blocks.push({ type: "heading3", text: "Constat" }); blocks.push({ type: "paragraph", text: res.constat }); }
      if (res.qualification) { blocks.push({ type: "heading3", text: "Qualification réglementaire" }); blocks.push({ type: "paragraph", text: res.qualification }); }
      if (res.impacts) { blocks.push({ type: "heading3", text: "Impacts" }); blocks.push({ type: "paragraph", text: res.impacts }); }
      if (res.remediable) blocks.push({ type: "keyvalue", rows: [["Caractère remédiable", res.remediable]] });
      if (res.recommandations) { blocks.push({ type: "heading3", text: "Recommandations techniques" }); blocks.push({ type: "paragraph", text: res.recommandations }); }
      if (res.photos && res.photos.length) blocks.push({ type: "photoGrid", photos: res.photos, caption: "Réserve n°" + (idx + 1) });
    });
  }

  // --- Clause de neutralité ---
  blocks.push({ type: "heading1", text: "13. Portée du constat" });
  blocks.push({ type: "paragraph", text: "Le présent document constate et qualifie techniquement les faits observés lors de la visite, à la date indiquée. Il est établi de manière strictement neutre et impartiale, sans préjuger des décisions des autorités compétentes (mairie, ARS, préfecture, tribunal). Il ne constitue ni un avis juridique, ni une décision administrative ou judiciaire. La décision finale appartient en toute hypothèse aux autorités compétentes." });

  // --- Signatures ---
  blocks.push({ type: "heading1", text: "14. Signatures" });
  blocks.push({ type: "signatureBlock", signatures: STATE.signatures });

  return blocks;
}

function ampleurLabelFromValue(v) {
  const found = AMPLEUR.find(a => a.v === v);
  return found ? found.l : v;
}

function appendBlockToPrintDoc(doc, container, b) {
  switch (b.type) {
    case "title":
      container.appendChild(make(doc, "h1", "title", b.text)); break;
    case "subtitle":
      container.appendChild(make(doc, "p", "subtitle", b.text)); break;
    case "heading1":
      container.appendChild(make(doc, "h1", "h1", b.text)); break;
    case "heading2":
      container.appendChild(make(doc, "h2", "h2", b.text)); break;
    case "heading3":
      container.appendChild(make(doc, "h3", "h3", b.text)); break;
    case "paragraph":
      container.appendChild(make(doc, "p", "body-p" + (b.italic ? " italic" : ""), b.text)); break;
    case "keyvalue": {
      const table = doc.createElement("table");
      table.className = "kv";
      b.rows.forEach(r => {
        const tr = doc.createElement("tr");
        const td1 = doc.createElement("td"); td1.className = "k"; td1.textContent = r[0];
        const td2 = doc.createElement("td"); td2.textContent = r[1] || "—";
        tr.appendChild(td1); tr.appendChild(td2);
        table.appendChild(tr);
      });
      container.appendChild(table);
      break;
    }
    case "elementAbsent": {
      const p = doc.createElement("p");
      p.className = "absent-line";
      p.textContent = b.label + " : absent / sans objet" + (b.note ? " — " + b.note : "");
      container.appendChild(p);
      break;
    }
    case "photoGrid": {
      const grid = doc.createElement("div");
      grid.className = "photo-grid";
      b.photos.forEach(p => { const img = doc.createElement("img"); img.src = p.data; grid.appendChild(img); });
      container.appendChild(grid);
      const cap = doc.createElement("div");
      cap.className = "photo-caption";
      cap.textContent = b.caption || "";
      container.appendChild(cap);
      break;
    }
    case "signatureBlock": {
      const grid = doc.createElement("div");
      grid.className = "sig-grid";
      ["expert", "bailleur", "locataire"].forEach(role => {
        const block = doc.createElement("div");
        block.className = "sig-block";
        const roleP = doc.createElement("div");
        roleP.className = "role";
        roleP.textContent = SIGNATURE_ROLE_LABEL[role];
        block.appendChild(roleP);
        if (b.signatures[role]) {
          const img = doc.createElement("img");
          img.src = b.signatures[role];
          block.appendChild(img);
        } else {
          const none = doc.createElement("div");
          none.className = "none";
          none.textContent = "Non signé";
          block.appendChild(none);
        }
        grid.appendChild(block);
      });
      container.appendChild(grid);
      break;
    }
  }
}

function make(doc, tag, cls, text) {
  const n = doc.createElement(tag);
  n.className = cls;
  n.textContent = text;
  return n;
}
